<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>尚硅谷会员注册页面</title>
  <link href="../../static/css/style.css" rel="stylesheet" type="text/css">
  <script src="../../static/script/jquery-1.7.2.js" type="text/javascript"></script>
  <script type="text/javascript">

    //主页面加载完成以后进入
    $(function () {
      //注册按钮绑定单击事件
      $("#sub_btn").click(function () {

        //1. 用户名必须由字母 数字 下划线组成 长度 5～12 位
        //1.1 获取用户名内容
        let usernameText = $("#username").val();

        //1.2 创建正则表达式
        var usernamePatt = /^\w{5,12}$/;

        //1.3 使用test方法验证
        if (!usernamePatt.test(usernameText)) {
          //1.4 提示用户结果
          $("span.errorMsg").text("用户名不合法！");
          return false;
        }
        //2. 密码必须由字母 数字 下划线组成 长度5～12位
        let passwordText = $("#password").val();

        var passwordPatt = /^\w{5,12}$/;

        if (!passwordPatt.test(passwordText)) {
          $("span.errorMsg").text("密码不合法！");
          return false;
        }

        //3. 确认密码 必须与 密码 相同
        let repwdText = $("#repwd").val();

        if (passwordText != repwdText) {
          $("span.errorMsg").text("确认密码和密码不一致！");
          return false;
        }

        //4. 验证邮箱格式 xxxxx@xxxx.com
        let emailText = $("#email").val();

        var emailPatt = /^[a-z\d]+(\.[a-z\d]+)*@([\da-z](-[\da-z])?)+(\.{1,2}[a-z]+)+$/;

        if (!emailPatt.test(emailText)) {
          $("span.errorMsg").text("邮箱不合法！");
          return false;
        }

        //5. 验证码 目前只需要用户自己输入 因为还没学习验证码生成的后端内容

        let codeText = $("#code").val();

        //5.1 压缩空格
        let codeTextWithOutspace = codeText.trim();

        if (codeTextWithOutspace == "" || codeTextWithOutspace == null ) {

          $("span.errorMsg").text("验证码不合法！");

          return false;

        }

        $("span.errorMsg").text("");

      })
    })

  </script>
  <style type="text/css">
    .login_form {
      height: 420px;
      margin-top: 25px;
    }

  </style>
</head>
<body>
<div id="login_header">
  <img alt="" class="logo_img" src="../../static/img/logo.gif">
</div>

<div class="login_banner">

  <div id="l_content">
    <span class="login_word">欢迎注册</span>
  </div>

  <div id="content">
    <div class="login_form">
      <div class="login_box">
        <div class="tit">
          <h1>注册尚硅谷会员</h1>
          <span class="errorMsg"></span>
        </div>
        <div class="form">
          <form action="regist_success.html">
            <label>用户名称：</label>
            <input autocomplete="off" class="itxt" id="username"
                   name="username" placeholder="请输入用户名" tabindex="1"
                   type="text"/>
            <br/>
            <br/>
            <label>用户密码：</label>
            <input autocomplete="off" class="itxt" id="password" name="password" placeholder="请输入密码" tabindex="1"
                   type="password"/>
            <br/>
            <br/>
            <label>确认密码：</label>
            <input autocomplete="off" class="itxt" id="repwd" name="repwd" placeholder="确认密码" tabindex="1"
                   type="password"/>
            <br/>
            <br/>
            <label>电子邮件：</label>
            <input autocomplete="off" class="itxt" id="email" name="email" placeholder="请输入邮箱地址" tabindex="1"
                   type="text"/>
            <br/>
            <br/>
            <label>验证码：</label>
            <input class="itxt" id="code" style="width: 150px;" type="text"/>
            <img alt="" src="../../static/img/code.bmp" style="float: right; margin-right: 40px">
            <br/>
            <br/>
            <input id="sub_btn" type="submit" value="注册"/>

          </form>
        </div>

      </div>
    </div>
  </div>
</div>
<div id="bottom">
			<span>
				尚硅谷书城.Copyright &copy;2015
			</span>
</div>
</body>
</html>
